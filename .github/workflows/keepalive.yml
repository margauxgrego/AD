name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 8 * * 1"  # Chaque lundi à 8h UTC
  workflow_dispatch:       # Déclenchement manuel pour tester

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/keepalive
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://service-produit-stock.vercel.app/api/keepalive)
          echo "HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1
